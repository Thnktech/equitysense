# Theme is honored both locally and on Streamlit Community Cloud.
# Server settings (port / headless) are intentionally NOT pinned here —
# Streamlit Cloud needs port 8501 and headless mode, and pinning either
# in config.toml breaks the cloud's health check. For a custom local
# port use:  streamlit run app.py --server.port 8502
[theme]
base = "dark"
primaryColor = "#4FC3F7"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#ECEFF1"
font = "sans serif"
