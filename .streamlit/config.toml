# --- Local-dev convenience ---
# The [server] section is only honored when running locally. Streamlit
# Community Cloud ignores it and uses its own port + headless setup.
[server]
port = 8502
headless = false

# --- Theme (applies everywhere) ---
[theme]
base = "dark"
primaryColor = "#4FC3F7"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B22"
textColor = "#ECEFF1"
font = "sans serif"
